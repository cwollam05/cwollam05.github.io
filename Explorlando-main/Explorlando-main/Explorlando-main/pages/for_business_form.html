<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership Request Form - Explorlando</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/for_business_style.css">
    <script src="../js/for_business_script.js"></script>
</head>

<body>

    <header>
        <header class="top-bar">
            <a class="logo" href="home.html">
                <img src="../img/Explorlando-Logo.PNG" alt="Explorlando logo">
            </a>

            <form class="top-search" role="search">
                <input type="search" placeholder="Search..." aria-label="Search Explorlando">
            </form>

            <a href="profile.html" class="account-btn">
                <img src="../img/user-1.png" alt="Account icon">
                <span>My Account</span>
            </a>
        </header>

        <div class="app-layout">
            <nav class="side-nav">
                <a class="nav-item" href="login.html">Login</a>
                <a class="nav-item" href="profile.html">Profile</a>
                <a class="nav-item" href="aboutus.html">About Us</a>
                <a class="nav-item" href="attractions.html">Attractions</a>
                <a class="nav-item" href="open-lobby.html">Open Lobby</a>
                <a class="nav-item" href="spotlight.html">Explorlando Spotlight</a>
                <a class="nav-item active" href="for_business.html">For Businesses</a>
                <a class="nav-item" href="settings.html">Settings</a>
            </nav>


            <main class="main-content">
                <section class="page-hero">
                    <h1>Explorlando Partnership Request Form</h1>
                </section>

                <section class="form-section">
                    <div class="form-intro">
                        <p>Fill out the following with the appropriate information to request an advertising partnership
                            with Explorlando!</p>
                    </div>

                    <form id="partnershipForm" class="partnership-form" action="for_business_submit.html" method="post">
                        <div class="form-group">
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" placeholder="Joe Smith">
                        </div>

                        <div class="form-group">
                            <label for="businessName">Business Name:</label>
                            <input type="text" id="businessName" name="businessName" placeholder=" Old Joe's Inc.">
                        </div>

                        <div class="form-group">
                            <label for="attractionName">Attraction Name:</label>
                            <input type="text" id="attractionName" name="attractionName"
                                placeholder="Joe's Local Crab Shack">
                        </div>

                        <div class="form-group">
                            <label for="email">Business Email:</label>
                            <input type="text" id="email" name="email" placeholder="JoeSmith@yahoo.com">
                        </div>

                        <div class="form-group">
                            <label for="phone">Business Phone:</label>
                            <input type="text" id="phone" name="phone" placeholder="(555) 555-5555">
                        </div>

                        <div class="form-group">
                            <label for="budget">Estimated Marketing Budget (Example Format: $1000):</label>
                            <input type="text" id="budget" name="budget" placeholder="$2000">
                        </div>

                        <div class="form-group">
                            <label for="content">Browse Marketing Content (user selects (4 x 3) images or 2160 x 1620
                                pixels):</label>
                            <input type="file" id="content" name="content">
                        </div>

                        <button type="submit" class="cta-button green-button">Submit Form</button>
                    </form>
                </section>
            </main>
        </div>


</body>

</html>
