<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorlando - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/home_styles.css">
    <script src="../js/home_script.js"></script>
</head>

<body>

    <header class="top-bar">
        <a class="logo" href="home.html">
            <img src="../img/Explorlando-Logo.PNG" alt="Explorlando logo">
        </a>

        <form class="top-search" role="search">
            <input type="search" placeholder="Search..." aria-label="Search Explorlando">
        </form>

        <a href="profile.html" class="account-btn">
            <img src="../img/user-1.png" alt="Account icon">
            <span>My Account</span>
        </a>
    </header>

    <main class="home-main">
        <div class="logo-container">
            <img src="../img/design_1.png" alt="Explorlando Logo" class="main-logo">
        </div>

        <div class="menu-grid">
            <a href="aboutus.html" class="menu-item">
                <img src="../img/About Us.png" alt="About Us">
                <p>About Us</p>
            </a>

            <a href="attractions.html" class="menu-item">
                <img src="../img/Attractions.png" alt="Attractions">
                <p>Attractions</p>
            </a>

            <a href="spotlight.html" class="menu-item">
                <img src="../img/FLocal Spotlight.png" alt="Explorlando Spotlight">
                <p>Explorlando Spotlight</p>
            </a>

            <a href="open-lobby.html" class="menu-item">
                <img src="../img/Open Lobby.png" alt="Open Lobby">
                <p>Open Lobby</p>
            </a>

            <a href="for_business.html" class="menu-item">
                <img src="../img/For Businesses.png" alt="For Businesses">
                <p>For Businesses</p>
            </a>
        </div>

        <div class="tagline">
            <p>New discoveries, local places!</p>
        </div>
    </main>


</body>

</html>
