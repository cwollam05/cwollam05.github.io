backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "projects"
    label: "Projects"
    files:
      - name: "projects"
        label: "Projects List"
        file: "content/projects.json"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Filter Tags"
                name: "tags"
                widget: "select"
                multiple: true
                options:
                  - { label: "Graphic Design", value: "graphic-design" }
                  - { label: "Video", value: "video" }
                  - { label: "Web", value: "web" }
                  - { label: "Branding", value: "branding" }
              - label: "Display Tags"
                name: "displayTags"
                widget: "list"
                hint: "Labels shown on the card (e.g. Web, HTML/CSS, JavaScript)"
              - { label: "Thumbnail", name: "thumbnail", widget: "image" }
              - label: "Links"
                name: "links"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - { label: "Label", name: "label", widget: "string", hint: "e.g. Live Site, GitHub, Watch" }
                  - { label: "URL", name: "url", widget: "string" }
